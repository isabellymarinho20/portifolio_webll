<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Novo Projeto</title>
<link rel="stylesheet" href="./css formularios/novoProjeto.css">
</head>

<body>

<section id="novoProjeto" class="admin-section">

<div class="admin-container">

<h2 class="admin-title">Adicionar Projeto</h2>

<form id="formProjeto" class="admin-form">

<input type="text" id="tituloProjeto" placeholder="Título do Projeto" required>

<input type="text" id="techProjeto" placeholder="Tecnologias (ex: HTML | CSS | JS)" required>

<input type="text" id="descProjeto" placeholder="Descrição do projeto" required>

<input type="text" id="linkProjeto" placeholder="Link do GitHub" required>

<input type="text" id="imgProjeto" placeholder="Caminho da imagem (img/projeto.png)" required>

<button type="submit" class="admin-btn">Adicionar Projeto</button>

</form>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
